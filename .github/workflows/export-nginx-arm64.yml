name: Export nginx arm64 image

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Pull nginx arm64 image
        run: |
          docker pull --platform linux/arm64 nginx:1.30.1

      - name: Check image architecture
        run: |
          docker image inspect nginx:1.30.1 --format 'Image: {{.RepoTags}} Architecture: {{.Architecture}} OS: {{.Os}}'

      - name: Save image to tar.gz
        run: |
          docker save nginx:1.30.1 | gzip > nginx-1.30.1-arm64.tar.gz
          ls -lh nginx-1.30.1-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nginx-1.30.1-arm64
          path: nginx-1.30.1-arm64.tar.gz
